<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random Internet</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: white;
}

button {
    font-size: 22px;
    padding: 18px 36px;
    cursor: pointer;
}
</style>

</head>
<body>

<button id="go" disabled>Loading...</button>

<script>

let websites = [];

fetch("sites.txt")
.then(r => r.text())
.then(text => {

    websites = text
        .split("\n")
        .map(x => x.trim())
        .filter(x => x.length > 0);

    document.getElementById("go").disabled = false;
    document.getElementById("go").textContent = "Random Website";

});

document.getElementById("go").onclick = () => {

    const random = Math.floor(Math.random() * websites.length);

    window.open(websites[random], "_blank");

};

</script>

</body>
</html>
